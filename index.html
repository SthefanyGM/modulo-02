<!DOCTYPE html> <!-- Informa ao navegador que esse documento usa HTML5 -->
<html lang="pt-br"> <!-- Marca de inicio da pagina HTML. O atributo lang="pt-br" indica o idioma principal é o português -->
<head><!-- Cabeçalho da página. Aqui ficam configurações que nao vao aparecer no corpo da pagina -->
    <meta charset="UTF-8"> <!-- Define o padrao de carecteres. Permite acentos, ç, emojis e caracteres especiais -->
    <meta name="viewport" content="width=, initial-scale=1.0"> <!-- Faz a pagina se adaptar a celulares e computadores -->
    <title>Meu primeiro site</title> <!-- Titulo da pagina, aparece na aba do navegador -->
</head> <!-- Fecha a tag HEAD-->
<body> <!-- Corpo da pagina. Tudo que aparece para o usuario esta aqui-->
    <h1>Bem vindos ao meu site!</h1>
    <h2>Site para meus estudos do Full Stack</h2>
    <p>Esta é uma estrutura HTML básica</p>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
</body>
</html>
